<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-3px); border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">

    <div class="max-w-5xl mx-auto">
        <nav class="mb-10 flex items-center space-x-2 text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">
            <a href="/" id="root-link" class="hover:text-blue-400 transition flex items-center"><i class="fas fa-home mr-2"></i> Portal</a>
            <span>/</span>
            <span id="current-crumb" class="text-blue-500">Resources</span>
        </nav>

        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 id="folder-name" class="text-4xl md:text-5xl font-black text-white mb-3 italic tracking-tighter">Loading...</h1>
                <p id="folder-desc" class="text-slate-400 max-w-xl text-sm leading-relaxed">High-fidelity mechanical simulations and curriculum resources.</p>
            </div>
            <button onclick="loadResources(true)" class="p-3 glass rounded-xl hover:bg-white/10 transition group" title="Force Refresh">
                <i class="fas fa-sync-alt text-slate-400 group-active:rotate-180 transition-transform"></i>
            </button>
        </header>

        <div id="file-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

        <div id="loader" class="text-center py-24">
            <i class="fas fa-atom fa-spin text-5xl text-blue-600"></i>
        </div>
    </div>

    <script>
        const repoOwner = "mrrabeagithub";
        const repoName = "Grade-11-Physics-Resources";
        
        async function loadResources(force = false) {
            const grid = document.getElementById('file-grid');
            const loader = document.getElementById('loader');
            const titleElement = document.getElementById('folder-name');
            const rootLink = document.getElementById('root-link');

            const pathSegments = window.location.pathname.split('/').filter(s => s && s !== 'index.html');
            const repoIndex = pathSegments.indexOf(repoName);
            let segments = (repoIndex !== -1) ? pathSegments.slice(repoIndex + 1) : ["Chapter-10-Rotational-Dynamics", "06-Simulations"];

            const depth = segments.length;
            rootLink.href = depth > 0 ? "../".repeat(depth) + "index.html" : "index.html";

            const currentPath = segments.join('/');
            titleElement.innerText = (segments[segments.length - 1] || 'Library').replace(/-/g, ' ');

            const cacheBuster = force ? `&t=${Date.now()}` : '';
            const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${currentPath}?ref=main${cacheBuster}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                loader.classList.add('hidden');
                grid.innerHTML = '';

                // SORTING & FILTERING
                const visibleItems = data.filter(item => {
                    const name = item.name.toLowerCase();
                    // --- THE FILTER: Hides index, readme, and hidden files from students ---
                    return !(name === 'index.html' || name === 'readme.md' || name.startsWith('.'));
                });

                visibleItems.sort((a, b) => (a.type === b.type) ? a.name.localeCompare(b.name) : (a.type === 'dir' ? -1 : 1));

                visibleItems.forEach(item => {
                    const card = document.createElement('a');
                    const ext = item.name.split('.').pop().toLowerCase();
                    
                    if (item.type === 'dir') card.href = `./${item.name}/index.html`;
                    else if (ext === 'html') card.href = `https://${repoOwner}.github.io/${repoName}/${currentPath}/${item.name}`;
                    else card.href = item.html_url;

                    card.target = "_blank";
                    card.className = "glass p-6 rounded-2xl flex flex-col justify-between card-hover border border-white/5 group";
                    
                    let icon = 'fa-file text-slate-500';
                    let typeLabel = 'Resource';
                    if (item.type === 'dir') { icon = 'fa-folder text-amber-500'; typeLabel = 'Folder'; }
                    else if (ext === 'html') { icon = 'fa-play-circle text-emerald-400'; typeLabel = 'Interactive Sim'; }
                    else if (ext === 'pdf') { icon = 'fa-file-pdf text-rose-400'; typeLabel = 'Document'; }

                    card.innerHTML = `
                        <div>
                            <i class="fas ${icon} text-2xl mb-4"></i>
                            <h4 class="font-bold text-slate-100 group-hover:text-blue-400 transition text-sm mb-1">${item.name.replace(/-/g, ' ')}</h4>
                            <p class="text-[9px] text-slate-500 uppercase tracking-widest font-black">${typeLabel}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) { loader.innerHTML = `<p class="text-red-400">Sync Error. Check if Repo is Public.</p>`; }
        }
        window.addEventListener('DOMContentLoaded', () => loadResources());
    </script>
</body>
</html>
