<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-hover { transition: all 0.2s ease-in-out; }
        .card-hover:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">

    <div class="max-w-5xl mx-auto">
        <!-- Breadcrumb / Navigation -->
        <nav class="mb-8 flex items-center space-x-2 text-xs font-semibold uppercase tracking-widest text-slate-500">
            <a href="/" id="root-link" class="hover:text-blue-400 transition">Portal</a>
            <span id="breadcrumb-separator" class="hidden">/</span>
            <span id="parent-folder" class="hidden"></span>
        </nav>

        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 id="folder-name" class="text-4xl font-black text-white mb-3 italic tracking-tighter">Loading...</h1>
                <p id="folder-desc" class="text-slate-400 max-w-xl">Automated resource directory. Synchronized with the Grade 11 Physics repository.</p>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="window.location.reload()" class="p-3 glass rounded-xl hover:bg-white/10 transition" title="Refresh list">
                    <i class="fas fa-sync-alt text-slate-400"></i>
                </button>
                <a href="https://github.com/mrrabeagithub/Grade-11-Physics-Resources" target="_blank" class="glass px-6 py-3 rounded-xl text-sm font-bold hover:bg-white/10 transition flex items-center">
                    <i class="fab fa-github mr-2"></i> Source
                </a>
            </div>
        </header>

        <!-- Dynamic Grid -->
        <div id="file-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Items injected here -->
        </div>

        <!-- States -->
        <div id="loader" class="text-center py-24">
            <i class="fas fa-circle-notch fa-spin text-5xl text-blue-600"></i>
        </div>

        <div id="error-message" class="hidden glass p-10 rounded-3xl border-red-500/20 text-center">
            <div class="bg-red-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-exclamation-triangle text-red-500 text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Access Issue Detected</h3>
            <p id="error-text" class="text-slate-400 mb-6"></p>
            <div class="text-xs text-slate-500 bg-slate-900/50 p-4 rounded-lg inline-block text-left">
                <p>Possible fixes:</p>
                <ul class="list-disc ml-4 mt-1 space-y-1">
                    <li>Verify the Repository is set to <strong>Public</strong>.</li>
                    <li>Check for typos in folder names on GitHub.</li>
                    <li>Wait 60 seconds (GitHub API Rate Limiting).</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        /**
         * UNIVERSAL CONFIGURATION
         */
        const repoOwner = "mrrabeagithub";
        const repoName = "Grade-11-Physics-Resources";
        
        async function loadResources() {
            const grid = document.getElementById('file-grid');
            const loader = document.getElementById('loader');
            const errorContainer = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const titleElement = document.getElementById('folder-name');
            const rootLink = document.getElementById('root-link');

            // 1. Determine depth and path
            const pathSegments = window.location.pathname.split('/').filter(s => s && s !== 'index.html');
            const repoIndex = pathSegments.indexOf(repoName);
            
            let segments = [];
            if (repoIndex !== -1) {
                segments = pathSegments.slice(repoIndex + 1);
            } else {
                // Testing/Preview Fallback
                segments = ["Chapter-10-Rotational-Dynamics", "06-Simulations"];
            }

            // Adjust root link based on depth
            const depth = segments.length;
            rootLink.href = "../".repeat(depth) + "index.html";

            const currentPath = segments.join('/');
            const currentFolderName = segments[segments.length - 1] || 'Library';
            titleElement.innerText = currentFolderName.replace(/-/g, ' ');

            // 2. Fetch from GitHub API
            const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${currentPath}`;

            try {
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    if (response.status === 404) throw new Error(`Directory "${currentPath}" not found. Verify repository is Public.`);
                    if (response.status === 403) throw new Error("API Limit reached. Wait 60 seconds.");
                    throw new Error(`Connection Error (${response.status})`);
                }

                const data = await response.json();
                loader.classList.add('hidden');

                if (data.length === 0) {
                    errorText.innerText = "This directory is currently empty.";
                    errorContainer.classList.remove('hidden');
                    return;
                }

                // Sort: Directories first, then alphabetically
                data.sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });

                data.forEach(item => {
                    // Filter: Hide index and system files
                    const name = item.name.toLowerCase();
                    if (name === 'index.html' || name === 'readme.md' || name.startsWith('.')) return;

                    const card = document.createElement('a');
                    const ext = item.name.split('.').pop().toLowerCase();
                    
                    // Logic for Link Handling
                    if (item.type === 'dir') {
                        // Link to the folder's index
                        card.href = `./${item.name}/index.html`;
                    } else if (ext === 'html') {
                        // Direct Pages execution for Simulations/SmartSheets
                        card.href = `https://${repoOwner}.github.io/${repoName}/${currentPath}/${item.name}`;
                    } else {
                        // Standard GitHub viewer for PDFs/Images
                        card.href = item.html_url;
                    }

                    card.target = "_blank";
                    card.className = "glass p-6 rounded-2xl flex flex-col justify-between card-hover border border-white/5 group";
                    
                    let icon = 'fa-file text-slate-500';
                    let typeLabel = 'File';
                    let accentColor = 'group-hover:text-blue-400';

                    if (item.type === 'dir') {
                        icon = 'fa-folder text-yellow-500';
                        typeLabel = 'Sub-Directory';
                    } else if (ext === 'html') {
                        icon = 'fa-play-circle text-emerald-400';
                        typeLabel = 'Interactive / Sim';
                        accentColor = 'group-hover:text-emerald-400';
                    } else if (ext === 'pdf') {
                        icon = 'fa-file-pdf text-red-400';
                        typeLabel = 'Document';
                    } else if (['png', 'jpg', 'jpeg'].includes(ext)) {
                        icon = 'fa-image text-blue-400';
                        typeLabel = 'Asset';
                    }

                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <i class="fas ${icon} text-2xl"></i>
                                <i class="fas fa-external-link-alt text-[10px] text-slate-600 group-hover:text-white transition"></i>
                            </div>
                            <h4 class="font-bold text-slate-100 ${accentColor} transition line-clamp-2 mb-1">${item.name.replace(/-/g, ' ')}</h4>
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">${typeLabel}</p>
                        </div>
                        <div class="mt-4 pt-4 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[9px] text-slate-600">${item.type === 'dir' ? '--' : (item.size / 1024).toFixed(1) + ' KB'}</span>
                            <span class="text-[9px] opacity-0 group-hover:opacity-100 transition text-blue-400 font-bold uppercase tracking-tighter">Open Resource</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error("Gallery Error:", error);
                loader.classList.add('hidden');
                errorText.innerText = error.message;
                errorContainer.classList.remove('hidden');
            }
        }

        window.addEventListener('DOMContentLoaded', loadResources);
    </script>
</body>
</html>
