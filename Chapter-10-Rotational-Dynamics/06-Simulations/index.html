<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-12 flex justify-between items-center">
            <div>
                <h1 id="folder-name" class="text-3xl font-bold text-white mb-2 italic tracking-tight">Loading Gallery...</h1>
                <p class="text-slate-400">Automated resource directory for Grade 11 Physics</p>
            </div>
            <a href="../../index.html" class="bg-slate-800 hover:bg-slate-700 px-5 py-2 rounded-lg text-sm font-semibold transition">
                <i class="fas fa-arrow-left mr-2 text-xs"></i> Back to Portal
            </a>
        </header>

        <div id="file-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Files injected here -->
        </div>

        <div id="loader" class="text-center py-20">
            <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500"></i>
        </div>

        <div id="error-message" class="hidden glass p-6 rounded-2xl border-red-500/30 text-center">
            <i class="fas fa-exclamation-triangle text-red-400 text-3xl mb-4"></i>
            <p id="error-text" class="text-red-200 font-medium"></p>
            <p class="text-slate-500 text-xs mt-2">Check: 1. Repo is Public? 2. Repo name in script is correct?</p>
        </div>
    </div>

    <script>
        /**
         * CONFIGURATION
         * Ensure these match your GitHub repository exactly.
         */
        const repoOwner = "mrrabeagithub";
        const repoName = "Grade-11-Physics-Resources";
        
        async function loadFiles() {
            const grid = document.getElementById('file-grid');
            const loader = document.getElementById('loader');
            const errorContainer = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const titleElement = document.getElementById('folder-name');

            // 1. Determine the path from the URL
            const fullPath = window.location.pathname;
            const pathSegments = fullPath.split('/').filter(s => s && s !== 'index.html');

            // Find repo index to extract subfolder path
            const repoIndex = pathSegments.indexOf(repoName);
            let segments = [];
            
            if (repoIndex !== -1) {
                // We are on the web: mrrabeagithub.github.io/Grade-11-Physics-Resources/folder1/folder2
                segments = pathSegments.slice(repoIndex + 1);
            } else {
                // Preview/Local Fallback
                segments = ["Chapter-10-Rotational-Dynamics", "06-Simulations"];
            }

            const currentPath = segments.join('/');
            titleElement.innerText = segments[segments.length - 1]?.replace(/-/g, ' ') || 'Resources';

            // 2. Fetch from GitHub API
            const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${currentPath}`;

            try {
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Directory "${currentPath}" not found. Verify repo is Public.`);
                    }
                    throw new Error(`API Error ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                loader.classList.add('hidden');

                if (!Array.isArray(data)) throw new Error("API returned object instead of list.");

                if (data.length === 0) {
                    errorText.innerText = "This folder is currently empty.";
                    errorContainer.classList.remove('hidden');
                    return;
                }

                data.forEach(file => {
                    // Hide the current index file and config
                    if (file.name.toLowerCase() === 'index.html' || 
                        file.name === 'README.md' || 
                        file.name.startsWith('.')) return;

                    const card = document.createElement('a');
                    const pagesBase = `https://${repoOwner}.github.io/${repoName}/`;
                    
                    // Direct executable link for HTML, otherwise GitHub UI link
                    card.href = file.name.endsWith('.html') 
                        ? pagesBase + currentPath + '/' + file.name 
                        : file.html_url;

                    card.target = "_blank";
                    card.className = "glass p-6 rounded-2xl flex items-center justify-between hover:bg-white/5 transition-all group border border-white/5";
                    
                    let iconClass = 'fa-file text-slate-400';
                    const ext = file.name.split('.').pop().toLowerCase();
                    
                    if (ext === 'html') iconClass = 'fa-play-circle text-emerald-400';
                    else if (ext === 'pdf') iconClass = 'fa-file-pdf text-red-400';
                    else if (['png','jpg','jpeg'].includes(ext)) iconClass = 'fa-image text-blue-400';
                    else if (file.type === 'dir') iconClass = 'fa-folder text-yellow-400';

                    card.innerHTML = `
                        <div class="flex items-center space-x-4">
                            <i class="fas ${iconClass} text-2xl"></i>
                            <div>
                                <h4 class="font-semibold text-slate-100 group-hover:text-blue-400 transition break-all">${file.name}</h4>
                                <p class="text-[10px] text-slate-500 uppercase tracking-widest">${(file.size / 1024).toFixed(1)} KB</p>
                            </div>
                        </div>
                        <i class="fas fa-external-link-alt text-slate-600 text-xs group-hover:text-white transition ml-4"></i>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error("Fetch Error:", error);
                loader.classList.add('hidden');
                errorText.innerText = error.message;
                errorContainer.classList.remove('hidden');
            }
        }

        window.addEventListener('DOMContentLoaded', loadFiles);
    </script>
</body>
</html>
